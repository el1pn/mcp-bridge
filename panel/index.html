<div class="mcp-container">
	<div class="tabs">
		<ui-button id="tabMain" class="tab-button active" data-i18n="tab_main">Main</ui-button>
		<ui-button id="tabTest" class="tab-button" data-i18n="tab_test">Tool Test</ui-button>
		<ui-button id="tabIpc" class="tab-button" data-i18n="tab_ipc">IPC Test</ui-button>
	</div>

	<div id="panelMain" class="tab-content active">
		<div class="toolbar">
			<div class="ctrl-group">
				<span data-i18n="port">Port:</span>
				<ui-input id="portInput" style="width: 60px"></ui-input>
				<ui-button id="btnToggle" data-i18n="start">Start</ui-button>
			</div>
			<div class="ctrl-group" style="margin-left: 10px">
				<ui-checkbox id="autoStartCheck" data-i18n="auto_start">Auto Start</ui-checkbox>
			</div>
			<div class="spacer"></div>
			<ui-button id="btnClear" class="transparent" data-i18n="clear_logs">Clear Logs</ui-button>
			<ui-button id="btnCopy" class="transparent" data-i18n="copy_all">Copy All</ui-button>
		</div>
		<div id="logConsole" class="log-view"></div>
	</div>

	<div id="panelTest" class="tab-content">
		<div class="test-layout">
			<div class="left-panel" id="testLeftPanel">
				<div class="form-item">
					<label data-i18n="tool_name">Tool Name:</label>
					<ui-input id="toolName" data-i18n-placeholder="tool_name_placeholder"
						placeholder="Select from list below"></ui-input>
				</div>
				<label data-i18n="tool_list">Available Tools:</label>
				<div class="tools-list" id="toolsList"></div>
			</div>

			<div class="resizer" id="testResizer"></div>

			<div class="right-panel">
				<div class="tool-description">
					<label data-i18n="tool_desc_label">Description:</label>
					<div id="toolDescription" class="description-box" data-i18n="tool_desc_placeholder">Select a
						tool to view description</div>
				</div>
				<div class="flex-v">
					<label data-i18n="tool_params">Parameters (JSON):</label>
					<textarea id="toolParams" spellcheck="false" placeholder="{}"></textarea>
				</div>
				<div class="button-group">
					<ui-button id="testBtn" class="green" data-i18n="test_tool">Test Tool</ui-button>
					<ui-button id="listToolsBtn" data-i18n="refresh_list">Refresh List</ui-button>
					<ui-button id="clearTestBtn" data-i18n="clear_result">Clear Result</ui-button>
					<ui-button id="probeApisBtn" data-i18n="probe_api">Probe API</ui-button>
				</div>
				<div class="flex-v">
					<label data-i18n="test_result">Test Result:</label>
					<textarea id="resultContent" readonly spellcheck="false"></textarea>
				</div>
			</div>
		</div>
	</div>

	<div id="panelIpc" class="tab-content">
		<div class="toolbar">
			<ui-button id="btnScanIpc" data-i18n="scan_msg">Scan Messages</ui-button>
			<select id="ipcFilter"
				style="margin-left: 5px; background: #333; color: #ccc; border: 1px solid #555; height: 25px">
				<option value="all" data-i18n="filter_all">Show All</option>
				<option value="available" data-i18n="filter_available">Available Only</option>
				<option value="unavailable" data-i18n="filter_unavailable">Unavailable Only</option>
				<option value="untested" data-i18n="filter_untested">Untested Only</option>
			</select>
			<div class="spacer"></div>
			<ui-button id="btnTestIpc" class="green" data-i18n="test_selected">Test Selected</ui-button>
		</div>
		<div class="ipc-container" style="display: flex; flex: 1; flex-direction: column; min-height: 0">
			<div class="ipc-list-header" style="padding: 5px; background: #222; border-bottom: 1px solid #444">
				<ui-checkbox id="cbSelectAllIpc" data-i18n="select_all">Select/Deselect All</ui-checkbox>
			</div>
			<div id="ipcList" class="ipc-list"
				style="flex: 1; overflow-y: auto; background: #1e1e1e; border: 1px solid #444"></div>
			<div style="padding: 5px; border-top: 1px solid #444; display: flex; flex-direction: column">
				<label data-i18n="params_json">Parameters (JSON):</label>
				<textarea id="ipcParams" data-i18n-placeholder="params_placeholder" placeholder='e.g. {"uuid": "..."}'
					style="
						height: 50px;
						width: 100%;
						box-sizing: border-box;
						background: #222;
						color: #ccc;
						border: 1px solid #444;
						margin-bottom: 5px;
					"></textarea>
			</div>
			<div style="
					height: 100px;
					display: flex;
					flex-direction: column;
					border-top: 1px solid #444;
					padding-top: 5px;
				">
				<label data-i18n="test_log">Test Log:</label>
				<textarea id="ipcLog" readonly style="flex: 1; font-family: monospace; font-size: 10px"></textarea>
			</div>
		</div>
	</div>
</div>
